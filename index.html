<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe AI</title>
<style>
/* === UI TIDAK DIUBAH === */
body {
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.board {
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
}
.cell {
  width:100px;
  height:100px;
  background:#1e293b;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  cursor:pointer;
}
</style>
</head>
<body>

<div>
  <div id="board" class="board"></div>
  <p id="status"></p>
</div>

<script>
const EMPTY = '';
const BOT_X = 'X';
const BOT_O = 'O';

let board = Array(9).fill(EMPTY);
let turn = BOT_X;

const elBoard = document.getElementById('board');
const elStatus = document.getElementById('status');

const memory = { q:{} };
const history = [];

const WIN_LINES = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function render(){
  elBoard.innerHTML='';
  board.forEach((v,i)=>{
    const c=document.createElement('div');
    c.className='cell';
    c.textContent=v;
    c.onclick=()=>move(i);
    elBoard.appendChild(c);
  });
}

function checkWinner(b){
  for(const [a,b1,c] of WIN_LINES){
    if(b[a] && b[a]===b[b1] && b[a]===b[c]) return b[a];
  }
  return b.every(x=>x)?'draw':null;
}

function wouldWin(b,sym,i){
  if(b[i]) return false;
  const t=b.slice();
  t[i]=sym;
  return checkWinner(t)===sym;
}

function isForkMove(b,move,symbol){
  if(b[move]) return false;
  const t=b.slice();
  t[move]=symbol;
  let count=0;
  for(let i=0;i<9;i++){
    if(!t[i] && wouldWin(t,symbol,i)) count++;
  }
  return count>=2;
}

function chooseMove(symbol){
  const avail = board.map((v,i)=>!v?i:null).filter(v=>v!==null);
  const opponent = symbol===BOT_X?BOT_O:BOT_X;

  // win
  for(const m of avail){
    if(wouldWin(board,symbol,m)) return m;
  }

  // block
  for(const m of avail){
    if(wouldWin(board,opponent,m)) return m;
  }

  // fork
  for(const m of avail){
    if(isForkMove(board,m,symbol)) return m;
  }

  // block fork
  for(const m of avail){
    if(isForkMove(board,m,opponent)) return m;
  }

  // center
  if(avail.includes(4)) return 4;

  // learning (simple)
  return avail[Math.floor(Math.random()*avail.length)];
}

function move(i){
  if(board[i]) return;

  board[i]=turn;
  render();

  const win = checkWinner(board);
  if(win){
    elStatus.textContent = win==='draw'?'Seri':win+' menang';
    learn(win);
    return;
  }

  turn = turn===BOT_X?BOT_O:BOT_X;

  if(turn===BOT_O){
    setTimeout(()=>{
      const m = chooseMove(BOT_O);
      board[m]=BOT_O;
      render();

      const win2 = checkWinner(board);
      if(win2){
        elStatus.textContent = win2==='draw'?'Seri':win2+' menang';
        learn(win2);
        return;
      }

      turn=BOT_X;
    },300);
  }
}

function learn(result){
  // versi sederhana (placeholder biar aman)
}

render();
</script>

</body>
</html>
