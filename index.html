<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe Mode Pilihan</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; }
    .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin: 20px auto; }
    .cell { width: 100px; height: 100px; background: #1e293b; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; border-radius: 10px; border: 2px solid #334155; cursor: pointer; }
    .cell.win { border-color: #22c55e; }
    button { margin: 5px; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .play { background: #334155; color: #f1f5f9; }
    .reset { background: #ef4444; color: #f1f5f9; }
    .status { margin-top: 10px; font-size: 1.2rem; }
    input[type=range] { width: 150px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>
    <div>
      <button onclick="setMode('human')">Human vs Bot</button>
      <button onclick="setMode('bot')">Bot vs Bot</button>
      <label style="margin-left:10px;">Kecepatan Bot: <span id="speedLabel">500ms</span></label>
      <input type="range" min="100" max="1000" step="50" value="500" id="speedRange">
    </div>
    <div class="board" id="board"></div>
    <div class="status" id="status">Pilih mode untuk memulai.</div>
    <div>
      <button class="play" onclick="resetGame(true)">Main lagi</button>
      <button class="reset" onclick="resetGame(false)">Hapus memori bot</button>
    </div>
    <div id="score">Player: 0 | Bot: 0 | Seri: 0</div>
  </div>  <script>
    const HUMAN = 'X';
    const BOT = 'O';
    const EMPTY = '';
    const STORAGE_KEY = 'ttt-bot-html';

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(EMPTY);
    let turn = HUMAN;
    let memory = loadMemory();
    let gameHistory = [];
    let score = {human:0, bot:0, draws:0};
    let hasEnded = false;
    let mode = null; // 'human' atau 'bot'
    let botSpeed = 500;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const scoreEl = document.getElementById('score');
    const speedRange = document.getElementById('speedRange');
    const speedLabel = document.getElementById('speedLabel');

    speedRange.addEventListener('input', ()=>{
      botSpeed = parseInt(speedRange.value);
      speedLabel.textContent = botSpeed + 'ms';
    });

    function setMode(selectedMode){
      mode = selectedMode;
      resetGame(true);
      statusEl.textContent = mode==='human' ? 'Giliran kamu. Kamu X, bot O.' : 'Bot X memulai...';
    }

    function loadMemory(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {q:{}, games:0, wins:0, losses:0, draws:0};
      }catch{return {q:{}, games:0, wins:0, losses:0, draws:0};}
    }

    function saveMemory(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(memory));
    }

    function boardKey(b){ return b.map(c=>c===EMPTY?'-':c).join(''); }

    function checkWinner(b){
      for(const [a,b1,c] of WIN_LINES){
        if(b[a] && b[a]===b[b1] && b[a]===b[c]) return b[a];
      }
      return b.every(cell=>cell!==EMPTY)?'draw':null;
    }

    function updateQ(history, result){
      const alpha=0.35, discount=0.85;
      const reward=result===BOT?1:result===HUMAN?-1:0.2;
      let nextMax=0;
      for(let i=history.length-1;i>=0;i--){
        const {state, action}=history[i];
        if(!memory.q[state]) memory.q[state]={};
        const current = memory.q[state][action]||0;
        const target = reward + discount*nextMax;
        memory.q[state][action]=current+alpha*(target-current);
        nextMax = Math.max(...Object.values(memory.q[state]),0);
      }
      memory.games+=1;
      saveMemory();
    }

    function endGame(result){
      hasEnded=true;
      if(mode==='human'){
        if(result===HUMAN){statusEl.textContent='Kamu menang!'; score.human+=1;}
        else if(result===BOT){statusEl.textContent='Bot menang!'; score.bot+=1;}
        else{statusEl.textContent='Seri!'; score.draws+=1;}
      }else{
        if(result===HUMAN){statusEl.textContent='Bot X menang!'; score.human+=1;}
        else if(result===BOT){statusEl.textContent='Bot O menang!'; score.bot+=1;}
        else{statusEl.textContent='Seri!'; score.draws+=1;}
      }
      updateScore();
      updateQ(gameHistory, result);
      gameHistory=[];
    }

    function updateScore(){
      scoreEl.textContent=`Player: ${score.human} | Bot: ${score.bot} | Seri: ${score.draws}`;
    }

    function pickBotMove(currentBoard){
      const key = boardKey(currentBoard);
      const qTable = memory.q[key]||{};
      const available = currentBoard.map((c,i)=>c===EMPTY?i:null).filter(v=>v!==null);
      if(!available.length) return null;
      const epsilon = Math.max(0.08, 0.28-memory.games*0.002);
      const explore = Math.random()<epsilon;
      if(explore) return available[Math.floor(Math.random()*available.length)];
      let bestMove = available[0], bestValue=-Infinity;
      for(const move of available){
        const value = qTable[move]||0;
        if(value>bestValue){bestValue=value; bestMove=move;}
      }
      return bestMove;
    }

    function renderBoard(){
      boardEl.innerHTML='';
      const winner = checkWinner(board);
      for(let i=0;i<9;i++){
        const cell = document.createElement('div');
        cell.className='cell';
        if(winner && WIN_LINES.some(l=>l.includes(i) && board[l[0]]===board[l[1]] && board[l[0]]===board[l[2]])) cell.classList.add('win');
        cell.textContent=board[i];
        cell.onclick=()=>{if(mode==='human') humanMove(i)};
        boardEl.appendChild(cell);
      }
    }

    function humanMove(idx){
      if(turn!==HUMAN || hasEnded || board[idx]!==EMPTY) return;
      board[idx]=HUMAN;
      turn=BOT;
      statusEl.textContent='Bot sedang berpikir...';
      renderBoard();
      setTimeout(botMove, botSpeed);
    }

    function botMove(){
      if(hasEnded) return;
      const move = pickBotMove(board);
      if(move!==null){
        gameHistory.push({state:boardKey(board), action:move});
        board[move]=turn;
      }
      turn = mode==='human'?HUMAN:turn===BOT_X?BOT_O:BOT_X;
      renderBoard();
      const winner = checkWinner(board);
      if(winner) endGame(winner);
      else if(mode==='bot') setTimeout(botMove, botSpeed);
    }

    function resetGame(keepLearned=true){
      board=Array(9).fill(EMPTY);
      turn=mode==='human'?HUMAN:BOT_X;
      statusEl.textContent=mode==='human'?'Giliran kamu. Kamu X, bot O.':'Bot X memulai...';
      hasEnded=false;
      gameHistory=[];
      if(!keepLearned){memory={q:{}, games:0, wins:0, losses:0, draws:0}; localStorage.removeItem(STORAGE_KEY);}
      renderBoard();
      if(mode==='bot') setTimeout(botMove, botSpeed);
    }

    renderBoard();
  </script></body>
</html>
